<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>CHOOSE YOUR AGENT - NeuroForge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "secondary-container": "#aa0266",
          "error": "#ffb4ab",
          "background": "#12121f",
          "surface-tint": "#ddb7ff",
          "surface-container": "#1f1e2b",
          "on-primary": "#490080",
          "outline-variant": "#4d4354",
          "tertiary": "#4cd7f6",
          "on-tertiary-fixed": "#001f26",
          "surface-bright": "#383846",
          "primary-fixed-dim": "#ddb7ff",
          "on-background": "#e3e0f3",
          "surface-dim": "#12121f",
          "on-surface": "#e3e0f3",
          "primary": "#ddb7ff",
          "surface-variant": "#343341",
          "surface-container-lowest": "#0d0d19",
          "primary-container": "#b76dff",
          "secondary": "#ffb0cd",
          "tertiary-container": "#009eb9",
          "surface-container-low": "#1a1a27",
          "surface": "#12121f",
          "outline": "#988d9f",
          "on-surface-variant": "#cfc2d6",
        },
        "fontFamily": {
          "headline-xl": ["Sora"],
          "body-md": ["Space Mono"],
          "headline-lg": ["Sora"],
          "label-sm": ["Space Mono"],
          "headline-lg-mobile": ["Sora"]
        },
        "fontSize": {
          "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
          "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
          "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
          "label-sm": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.15em", "fontWeight": "700"}],
          "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}]
        }
      }
    }
  }
</script>
<style>
  body { background-color: #050510; overflow: hidden; margin: 0; padding: 0; color: #e3e0f3; }
  .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%); background-size: 100% 2px; pointer-events: none; z-index: 100; }
  .grid-bg { position: absolute; width: 200%; height: 200%; background-image: linear-gradient(to right, rgba(221,183,255,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(221,183,255,0.05) 1px, transparent 1px); background-size: 60px 60px; transform: perspective(500px) rotateX(60deg) translateY(-20%); animation: grid-move 20s linear infinite; }
  @keyframes grid-move { 0% { transform: perspective(500px) rotateX(60deg) translateY(-50%); } 100% { transform: perspective(500px) rotateX(60deg) translateY(0%); } }
  .voxel-container { perspective: 1000px; transform-style: preserve-3d; animation: float 4s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  .pedestal { box-shadow: 0 0 50px rgba(221,183,255,0.4), inset 0 0 20px rgba(221,183,255,0.2); }
  .pulse-neon { animation: pulse-neon 2s ease-in-out infinite; }
  @keyframes pulse-neon { 0%, 100% { text-shadow: 0 0 10px rgba(221,183,255,0.8), 0 0 20px rgba(221,183,255,0.4); } 50% { text-shadow: 0 0 25px rgba(221,183,255,1), 0 0 40px rgba(221,183,255,0.6); } }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .dot { width: 8px; height: 8px; border-radius: 0; background: rgba(221,183,255,0.2); transition: all 0.3s ease; }
  .dot.active { background: #ddb7ff; box-shadow: 0 0 10px #ddb7ff; transform: scale(1.5); }
</style>
</head>
<body class="flex flex-col h-screen font-body-md overflow-hidden bg-surface-container-lowest">
<div class="scanlines"></div>
<div class="grid-bg"></div>

<header class="fixed top-0 w-full flex justify-between items-center px-8 md:px-16 py-6 z-50 border-b border-primary/10">
  <div class="flex flex-col">
    <h1 class="font-headline-lg-mobile md:font-headline-xl md:text-headline-xl text-primary drop-shadow-[0_0_8px_rgba(221,183,255,0.8)] uppercase tracking-widest pulse-neon">CHOOSE YOUR AGENT</h1>
    <p class="font-label-sm text-label-sm uppercase text-on-surface-variant tracking-widest mt-1" id="welcome-text">WELCOME OPERATOR — CHOOSE YOUR OPERATIVE</p>
  </div>
</header>

<main class="flex-grow flex flex-col items-center justify-center relative z-10">
  <div class="relative w-full max-w-6xl flex items-center justify-center h-[60vh] min-h-[400px]">
    <button id="prevBtn" class="absolute left-4 md:left-8 z-30 p-5 rounded-full border border-primary/20 bg-surface-container/40 hover:bg-primary/10 hover:border-primary/50 hover:scale-110 transition-all backdrop-blur-md">
      <span class="material-symbols-outlined text-primary text-3xl">chevron_left</span>
    </button>
    <button id="nextBtn" class="absolute right-4 md:right-8 z-30 p-5 rounded-full border border-primary/20 bg-surface-container/40 hover:bg-primary/10 hover:border-primary/50 hover:scale-110 transition-all backdrop-blur-md">
      <span class="material-symbols-outlined text-primary text-3xl">chevron_right</span>
    </button>

    <div class="flex items-end justify-center gap-12 md:gap-24 w-full">
      <div class="hidden lg:block opacity-20 scale-75 filter blur-sm">
        <div class="voxel-container">
          <img id="leftAgent" class="h-[200px] object-contain" src="" alt="Left Agent" />
        </div>
      </div>

      <div class="flex flex-col items-center">
        <div class="voxel-container relative mb-8 mt-16">
          <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-48 h-12 bg-primary/20 blur-2xl rounded-full"></div>
          <div class="pedestal absolute -bottom-2 left-1/2 -translate-x-1/2 w-32 h-2 bg-primary/60 border border-primary/80"></div>
          <img id="centerAgent" class="h-[280px] object-contain drop-shadow-[0_0_20px_rgba(221,183,255,0.4)]" src="" alt="Main Agent" />
        </div>
        <div class="text-center">
          <h2 class="font-headline-xl text-headline-xl text-primary pulse-neon uppercase" id="agent-name">LOADING</h2>
          <p class="font-label-sm text-label-sm text-outline uppercase tracking-widest mt-2" id="agent-role">[ ROLE ]</p>
        </div>
      </div>

      <div class="hidden lg:block opacity-20 scale-75 filter blur-sm">
        <div class="voxel-container">
          <img id="rightAgent" class="h-[200px] object-contain" src="" alt="Right Agent" />
        </div>
      </div>
    </div>
  </div>

  <div class="flex gap-3 mt-8 mb-4" id="dots"></div>
</main>

<div class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-4 md:px-16 py-8 bg-gradient-to-t from-background via-background/80 to-transparent">
  <div class="flex gap-4">
    <button id="prevBtn2" class="bg-surface-variant/20 text-tertiary border border-tertiary/50 px-6 py-4 backdrop-blur-md hover:bg-tertiary/20 transition-all font-label-sm text-label-sm uppercase flex items-center gap-2">
      <span class="material-symbols-outlined">chevron_left</span> PREVIOUS
    </button>
    <button id="nextBtn2" class="bg-surface-variant/20 text-tertiary border border-tertiary/50 px-6 py-4 backdrop-blur-md hover:bg-tertiary/20 transition-all font-label-sm text-label-sm uppercase flex items-center gap-2">
      NEXT <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>
  <button id="confirmBtn" class="bg-tertiary text-on-tertiary-fixed font-bold px-12 py-5 uppercase rounded-lg shadow-[0_0_30px_rgba(76,215,246,0.3)] hover:shadow-[0_0_50px_rgba(76,215,246,0.5)] hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-4">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">check_circle</span>
    <span class="tracking-[0.1em]">CONFIRM SELECTION</span>
  </button>
</div>

<script>
  var agents = [
    { name: "SHADOW", role: "Stealth Operative", img: "agent-1.png" },
    { name: "NOVA", role: "Cloud Specialist", img: "agent-2.png" },
    { name: "CIPHER", role: "Lead Agent", img: "agent-3.png" },
    { name: "VORTEX", role: "Threat Hunter", img: "agent-4.png" },
    { name: "BLAZE", role: "Incident Responder", img: "agent-5.png" },
    { name: "NEXUS", role: "Logic Analyst", img: "agent-6.png" }
  ];

  var current = 0;
  var player = localStorage.getItem("player") || "Operator";
  document.getElementById("welcome-text").textContent = "WELCOME " + player.toUpperCase() + " — CHOOSE YOUR OPERATIVE";

  var dotsDiv = document.getElementById("dots");
  agents.forEach(function(a, i) {
    var dot = document.createElement("div");
    dot.className = i === 0 ? "dot active" : "dot";
    dot.id = "dot-" + i;
    dotsDiv.appendChild(dot);
  });

  function updateDisplay() {
    var a = agents[current];
    var prev = agents[(current - 1 + agents.length) % agents.length];
    var next = agents[(current + 1) % agents.length];
    document.getElementById("centerAgent").src = a.img;
    document.getElementById("leftAgent").src = prev.img;
    document.getElementById("rightAgent").src = next.img;
    document.getElementById("agent-name").textContent = a.name;
    document.getElementById("agent-role").textContent = "[ " + a.role + " ]";
    agents.forEach(function(_, i) {
      document.getElementById("dot-" + i).className = i === current ? "dot active" : "dot";
    });
  }

  function goNext() { current = (current + 1) % agents.length; updateDisplay(); }
  function goPrev() { current = (current - 1 + agents.length) % agents.length; updateDisplay(); }

  document.getElementById("nextBtn").addEventListener("click", goNext);
  document.getElementById("nextBtn2").addEventListener("click", goNext);
  document.getElementById("prevBtn").addEventListener("click", goPrev);
  document.getElementById("prevBtn2").addEventListener("click", goPrev);

  document.getElementById("confirmBtn").addEventListener("click", function() {
  var a = agents[current];
  localStorage.setItem("agentName", a.name);
  localStorage.setItem("agentRole", a.role);
  localStorage.setItem("agentImg", a.img);

  // Save to database!
  fetch("http://localhost:3000/api/user", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: localStorage.getItem("player"),
      unique_id: localStorage.getItem("playerID"),
      agent_name: a.name,
      agent_img: a.img
    })
  }).then(() => {
    window.location.href = "dashboard.html";
  }).catch(() => {
    window.location.href = "dashboard.html";
  });
});

  const createParticles = () => {
    const body = document.body;
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'absolute bg-primary rounded-full opacity-20 pointer-events-none';
      const size = Math.random() * 4 + 1;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = (Math.random() * 100) + '%';
      particle.style.top = (Math.random() * 100) + '%';
      const duration = Math.random() * 10 + 5;
      const delay = Math.random() * 5;
      particle.animate([
        { transform: 'translateY(0) scale(1)', opacity: 0.2 },
        { transform: 'translateY(-' + (Math.random() * 500 + 100) + 'px) scale(0)', opacity: 0 }
      ], { duration: duration * 1000, delay: delay * 1000, iterations: Infinity, easing: 'linear' });
      body.appendChild(particle);
    }
  };

  window.onload = function() {
    createParticles();
    updateDisplay();
  };
</script>
</body></html>
