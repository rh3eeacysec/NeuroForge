<!DOCTYPE html>
<html>
<head>
  <title>NeuroForge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      color: #fff;
      font-family: monospace;
      height: 100vh;
      overflow: hidden;
    }

    video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 1;
      z-index: 0;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(5,5,16,0.6);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 12px;
      color: #fff;
      animation: glow 1.5s ease-in-out infinite alternate;
      margin-bottom: 8px;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #a855f7; }
      to { text-shadow: 0 0 40px #a855f7, 0 0 80px #a855f7; }
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 6px;
      color: rgba(168,85,247,0.6);
      margin-bottom: 50px;
    }

    input {
      background: none;
      border: none;
      border-bottom: 2px solid #a855f7;
      color: #a855f7;
      font-family: monospace;
      font-size: 22px;
      text-align: center;
      outline: none;
      padding: 10px;
      width: 300px;
      display: block;
      margin: 0 auto 30px;
    }

    input::placeholder { color: rgba(168,85,247,0.4); }

    button {
      background: none;
      border: 2px solid #a855f7;
      color: #a855f7;
      font-family: monospace;
      font-size: 16px;
      letter-spacing: 6px;
      padding: 16px 50px;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #a855f7;
      color: #050510;
      box-shadow: 0 0 30px #a855f7;
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline>
    <source src="bg-video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>NEUROFORGE</h1>
    <p class="subtitle">Cyber Simulation</p>
    <input type="text" id="name" placeholder="Enter your name..." />
    <button onclick="startGame()">ENTER</button>
  </div>

  <script>
    function startGame() {
  var name = document.getElementById("name").value;
  if (name === "") return;
  
  localStorage.setItem("player", name);
  
  var existingID = localStorage.getItem("playerID");
  if (!existingID) {
    var id = "NF-" + Math.floor(10000 + Math.random() * 90000);
    localStorage.setItem("playerID", id);
  }
  
  window.location.href = "character-select.html";
}
  </script>

</body>
</html>
