<!DOCTYPE html>
<html>
<head>
  <title>NeuroForge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      color: #fff;
      font-family: monospace;
      height: 100vh;
      overflow: hidden;
    }

    video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 1;
      z-index: 0;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(5,5,16,0.6);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 12px;
      color: #fff;
      animation: glow 1.5s ease-in-out infinite alternate;
      margin-bottom: 8px;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #a855f7; }
      to { text-shadow: 0 0 40px #a855f7, 0 0 80px #a855f7; }
    }

    .subtitle {
      font-size: 13px;
      letter-spacing: 6px;
      color: rgba(168,85,247,0.6);
      margin-bottom: 16px;
    }

    .returning {
      font-size: 14px;
      color: rgba(168,85,247,0.8);
      letter-spacing: 2px;
      margin-bottom: 30px;
      max-width: 500px;
      line-height: 1.8;
      font-weight: bold;
    }

    .returning span {
      color: #a855f7;
    }

    input {
      background: none;
      border: none;
      border-bottom: 2px solid #a855f7;
      color: #a855f7;
      font-family: monospace;
      font-size: 18px;
      text-align: center;
      outline: none;
      padding: 10px;
      width: 300px;
      display: block;
      margin: 0 auto 16px;
    }

    input::placeholder { color: rgba(168,85,247,0.4); }

    .id-input {
      font-size: 14px;
      border-bottom: 1px solid rgba(168,85,247,0.3);
      margin-bottom: 30px;
    }

    button {
      background: none;
      border: 2px solid #a855f7;
      color: #a855f7;
      font-family: monospace;
      font-size: 16px;
      letter-spacing: 6px;
      padding: 16px 50px;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: #a855f7;
      color: #050510;
      box-shadow: 0 0 30px #a855f7;
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline>
    <source src="bg-video.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>NEUROFORGE</h1>
    <p class="subtitle">CYBER SIMULATION</p>
    <p class="returning">
      Returning player? Enter your name and your UNIQUE ID<br>
      (e.g. <span>NF-47291</span>) to restore your progress!<br>
      New player? Just enter your name and we'll create your ID!
    </p>
    <input type="text" id="name" placeholder="Enter your name..." />
    <input type="text" id="existing-id" class="id-input" placeholder="Your ID (optional — e.g. NF-47291)" />
    <button onclick="startGame()">ENTER</button>
  </div>

  <script>
    function startGame() {
      var existingPlayer = localStorage.getItem("player");
if (existingPlayer && existingPlayer !== name) {
  localStorage.removeItem("xp");
  localStorage.removeItem("security_completed");
  localStorage.removeItem("cloud_completed");
  localStorage.removeItem("logic_completed");
  localStorage.removeItem("incident_completed");
}
      var name = document.getElementById("name").value;
      if (name === "") return;

      localStorage.setItem("player", name);

      var existingID = document.getElementById("existing-id").value.trim();
      if (existingID && existingID.startsWith("NF-")) {
        localStorage.setItem("playerID", existingID);
      } else {
        var currentID = localStorage.getItem("playerID");
        if (!currentID) {
          var id = "NF-" + Math.floor(10000 + Math.random() * 90000);
          localStorage.setItem("playerID", id);
        }
      }

      window.location.href = "character-select.html";
    }
  </script>

</body>
</html>
