<!DOCTYPE html>
<html>
<head>
  <title>NeuroForge — Leaderboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; color: #fff; font-family: monospace; }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 40px;
      border-bottom: 1px solid rgba(168,85,247,0.3);
      position: relative;
      z-index: 1;
    }
    .logo { color: #a855f7; font-size: 18px; letter-spacing: 4px; cursor: pointer; }
    .nav-links { display: flex; gap: 30px; font-size: 13px; }
    .nav-links a { color: rgba(168,85,247,0.6); text-decoration: none; letter-spacing: 2px; }
    .nav-links a:hover { color: #a855f7; }

    .page {
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 32px;
      letter-spacing: 6px;
      color: #a855f7;
      margin-bottom: 8px;
      animation: glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #a855f7; }
      to { text-shadow: 0 0 30px #a855f7, 0 0 60px #a855f7; }
    }

    .page-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
    }

    .leaderboard-table th {
      text-align: left;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(168,85,247,0.5);
      padding: 12px 16px;
      border-bottom: 1px solid rgba(168,85,247,0.2);
    }

    .leaderboard-table td {
      padding: 16px;
      font-size: 14px;
      border-bottom: 1px solid rgba(168,85,247,0.1);
    }

    .rank { color: rgba(255,255,255,0.4); width: 50px; }
    .rank.gold { color: #FFD700; font-size: 18px; }
    .rank.silver { color: #C0C0C0; font-size: 18px; }
    .rank.bronze { color: #CD7F32; font-size: 18px; }

    .player-name { color: #fff; letter-spacing: 2px; }
    .player-id { color: rgba(168,85,247,0.5); font-size: 11px; margin-top: 4px; }
    .xp { color: #a855f7; font-size: 16px; font-weight: bold; }
    .badge { 
      font-size: 11px; 
      padding: 4px 10px; 
      border: 1px solid rgba(168,85,247,0.4);
      color: rgba(168,85,247,0.8);
      letter-spacing: 1px;
    }

    .you-row { background: rgba(168,85,247,0.08); border-left: 2px solid #a855f7; }
    .you-tag {
      font-size: 10px;
      background: #a855f7;
      color: #050510;
      padding: 2px 8px;
      margin-left: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo" onclick="window.location.href='dashboard.html'">NEUROFORGE</div>
    <div class="nav-links">
      <a href="dashboard.html">Worlds</a>
      <a href="dashboard.html">Missions</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-title">LEADERBOARD</div>
    <div class="page-sub">Top agents ranked by XP — updated live</div>

    <table class="leaderboard-table">
      <thead>
        <tr>
          <th>RANK</th>
          <th>AGENT</th>
          <th>XP</th>
          <th>BADGE</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
      </tbody>
    </table>
  </div>

<script>
  var currentPlayer = localStorage.getItem("player");
  var currentID = localStorage.getItem("playerID");

  var logo = document.querySelector('.logo');
  if (currentPlayer) logo.textContent = "NEUROFORGE — " + currentPlayer.toUpperCase();

  fetch("http://localhost:3000/api/leaderboard")
    .then(r => r.json())
    .then(function(players) {

      players.forEach(function(p) {
        if (p.unique_id === currentID) p.isYou = true;
      });

      var ranks = ["🥇", "🥈", "🥉"];
      var tbody = document.getElementById("leaderboard-body");
      tbody.innerHTML = "";

      players.forEach(function(p, i) {
        var row = document.createElement("tr");
        if (p.isYou) row.className = "you-row";
        row.innerHTML = `
          <td class="rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i < 3 ? ranks[i] : "#" + (i+1)}</td>
          <td>
            <div class="player-name">${p.name}${p.isYou ? '<span class="you-tag">YOU</span>' : ''}</div>
            <div class="player-id">${p.unique_id}</div>
          </td>
          <td class="xp">${Number(p.total_xp).toLocaleString()} XP</td>
          <td><span class="badge">${p.badge || 'Recruit'}</span></td>
        `;
        tbody.appendChild(row);
      });
    })
    .catch(function() {
      document.getElementById("leaderboard-body").innerHTML = `
        <tr><td colspan="4" style="text-align:center; color:rgba(255,255,255,0.3); padding:40px;">
          Could not connect to server. Make sure Node.js is running!
        </td></tr>
      `;
    });
</script>

</body>
</html>
