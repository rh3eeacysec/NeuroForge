<!DOCTYPE html>
<html>
<head>
  <title>NeuroForge — Cloud World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; color: #fff; font-family: monospace; }
    .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.2; z-index: 0; }
    nav { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; border-bottom: 1px solid rgba(168,85,247,0.3); }
    .logo { color: #a855f7; font-size: 18px; letter-spacing: 4px; cursor: pointer; }
    .nav-links { display: flex; gap: 30px; font-size: 13px; }
    .nav-links a { color: rgba(168,85,247,0.6); text-decoration: none; letter-spacing: 2px; }
    .nav-links a:hover { color: #a855f7; }
    .page { position: relative; z-index: 1; padding: 40px; }
    .back-btn { background: none; border: none; color: rgba(168,85,247,0.6); font-family: monospace; font-size: 13px; cursor: pointer; letter-spacing: 2px; margin-bottom: 24px; display: block; }
    .back-btn:hover { color: #a855f7; }
    .world-header { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; }
    .world-icon { font-size: 48px; }
    .world-title { font-size: 36px; letter-spacing: 6px; color: #a855f7; animation: glow 1.5s ease-in-out infinite alternate; }
    @keyframes glow { from { text-shadow: 0 0 10px #a855f7; } to { text-shadow: 0 0 30px #a855f7, 0 0 60px #a855f7; } }
    .world-desc { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 2px; margin-bottom: 40px; }
    .levels-section h2 { font-size: 14px; letter-spacing: 4px; color: rgba(168,85,247,0.6); margin-bottom: 20px; }
    .levels-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin-bottom: 40px; }
    .level-btn { aspect-ratio: 1; background: rgba(168,85,247,0.2); border: 2px solid rgba(168,85,247,0.8); color: #fff; font-family: monospace; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .level-btn:hover { border-color: #a855f7; color: #a855f7; background: rgba(168,85,247,0.3); }
    .level-btn.completed { background: rgba(168,85,247,0.4); border-color: #a855f7; color: #a855f7; }
    .level-btn.locked { opacity: 0.25; cursor: not-allowed; }
    .difficulty-row { display: flex; gap: 24px; margin-bottom: 40px; }
    .diff-badge { font-size: 11px; padding: 6px 14px; border: 1px solid rgba(168,85,247,0.3); color: rgba(255,255,255,0.4); letter-spacing: 2px; }
    .diff-badge.active { border-color: #a855f7; color: #a855f7; }
    .progress-wrap { margin-bottom: 40px; }
    .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin-bottom: 8px; }
    .progress-bar { height: 4px; background: rgba(168,85,247,0.2); border-radius: 99px; }
    .progress-fill { height: 100%; background: #a855f7; border-radius: 99px; transition: width 0.5s ease; }
  </style>
</head>
<body>
  <img src="cloud-world.png" class="bg" />
  <nav>
    <div class="logo" onclick="window.location.href='dashboard.html'">NEUROFORGE</div>
    <div class="nav-links">
      <a href="worlds.html">Worlds</a>
      <a href="#">Missions</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </nav>
  <div class="page">
    <button class="back-btn" onclick="window.location.href='worlds.html'">← BACK TO WORLDS</button>
    <div class="world-header">
      <div class="world-icon">☁️</div>
      <div class="world-title">CLOUD WORLD</div>
    </div>
    <div class="world-desc">Navigate cloud infrastructure. Secure what floats. Handle misconfigurations and cloud breaches.</div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>WORLD PROGRESS</span>
        <span id="progress-text">0 / 50 levels</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="difficulty-row">
      <div class="diff-badge active">L1-10: EASY</div>
      <div class="diff-badge">L11-25: MEDIUM</div>
      <div class="diff-badge">L26-40: HARD</div>
      <div class="diff-badge">L41-50: EXTREME</div>
    </div>
    <div class="levels-section">
      <h2>SELECT LEVEL</h2>
      <div class="levels-grid" id="levels-grid"></div>
    </div>
  </div>
  <script>
    var player = localStorage.getItem("player");
    if (player) document.querySelector('.logo').textContent = "NEUROFORGE — " + player.toUpperCase();
    var completed = parseInt(localStorage.getItem("cloud_completed")) || 0;
    document.getElementById("progress-text").textContent = completed + " / 50 levels";
    document.getElementById("progress-fill").style.width = (completed / 50 * 100) + "%";
    var grid = document.getElementById("levels-grid");
    for (var i = 1; i <= 50; i++) {
      var btn = document.createElement("button");
      btn.className = "level-btn";
      if (i <= completed) { btn.className += " completed"; btn.textContent = "✓"; }
      else if (i === completed + 1) { btn.textContent = i; }
      else { btn.className += " locked"; btn.textContent = i; }
      if (i <= completed + 1) {
        var level = i;
        btn.onclick = function() {
          localStorage.setItem("currentWorld", "cloud");
          localStorage.setItem("currentLevel", level);
          window.location.href = "mission.html";
        };
      }
      grid.appendChild(btn);
    }
  </script>
</body>
</html>
